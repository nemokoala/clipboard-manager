<!-- 앱 아이콘 원본. `node assets/generate-icons.mjs` 로 png/icns/ico 를 생성한다. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 클립보드 본체(남색) -->
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b4c9b" />
      <stop offset="1" stop-color="#16265c" />
    </linearGradient>
    <!-- 상단 집게(청록) -->
    <linearGradient id="clip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3fc7dd" />
      <stop offset="1" stop-color="#0e8fb0" />
    </linearGradient>
    <!-- 종이 -->
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#e9edf6" />
    </linearGradient>
    <!-- 접힌 모서리 뒷면 -->
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c6cddd" />
      <stop offset="1" stop-color="#9aa5bd" />
    </linearGradient>
    <filter id="drop" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0b1330" flood-opacity="0.32" />
    </filter>
  </defs>

  <g filter="url(#drop)">
    <!-- 본체와 안쪽 홈 -->
    <rect x="168" y="150" width="688" height="760" rx="112" fill="url(#body)" />
    <rect x="228" y="212" width="568" height="636" rx="72" fill="#16265c" />

    <!-- 종이: 오른쪽 위 모서리가 접힌 문서 형태 -->
    <path
      fill="url(#paper)"
      d="M322 288 H650 L760 398 V760 A30 30 0 0 1 730 790 H322 A30 30 0 0 1 292 760 V318 A30 30 0 0 1 322 288 Z"
    />
    <path fill="url(#fold)" d="M650 288 L760 398 H680 A30 30 0 0 1 650 368 Z" />

    <!-- 상단 집게 -->
    <rect x="392" y="96" width="240" height="164" rx="66" fill="url(#clip)" />
    <circle cx="512" cy="158" r="40" fill="#16265c" />
  </g>
</svg>

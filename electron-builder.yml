# appId 는 표시 이름과 무관하고, macOS 가 권한(접근성 등)과 로그인 항목을 이 값으로
# 기억한다. 바꾸면 기존 사용자가 권한을 다시 허용해야 하므로 그대로 둔다.
appId: com.koala.simple-clipboard
productName: ClipBoard Manager
# GH_TOKEN 등이 있으면 electron-builder가 github publish를 추측해 [null] 설정으로 크래시난다.
publish: null
directories:
  output: dist-release
  buildResources: assets
files:
  - dist
  - dist-electron
  - assets
asarUnpack:
  - '**/node_modules/better-sqlite3/**'
mac:
  target: dmg
  category: public.app-category.productivity
  icon: assets/icon.icns
  # 키체인의 Apple Development 인증서로 자동 서명되면 배포용이 아니며,
  # 인증서가 revoked 상태일 때 macOS가 악성코드로 차단한다.
  identity: null
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
win:
  target: nsis
  icon: assets/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
